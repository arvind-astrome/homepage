<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub OS // Arvind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root { --bg: #0b0f1a; --card: rgba(30, 41, 59, 0.3); --border: #1e293b; --accent: #2bc3de; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f1f5f9; height: 100vh; overflow: hidden; }

        /* Dashboard Layout */
        #md-render { column-count: 4; column-gap: 1rem; height: 100%; }
        .md-section { break-inside: avoid; margin-bottom: 0.75rem; background: var(--card); padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); display: inline-block; width: 100%; }

        #md-render h2 { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; border-left: 3px solid; padding-left: 0.5rem; margin-bottom: 0.5rem; }
        .md-section:nth-of-type(4n+1) h2 { border-color: #2ed8a2; color: #2ed8a2; }
        .md-section:nth-of-type(4n+2) h2 { border-color: #d1aff8; color: #d1aff8; }
        .md-section:nth-of-type(4n+3) h2 { border-color: #ec6183; color: #ec6183; }
        .md-section:nth-of-type(4n+4) h2 { border-color: #e8b195; color: #e8b195; }

        #md-render ul { list-style: none; padding: 0; }
        #md-render li { margin-bottom: 0.25rem; font-size: 0.75rem; color: #97989d; }
        #md-render a { color: inherit; text-decoration: none; transition: 0.1s; }
        #md-render a.match { color: #fff; background: #2bc3de33; border-left: 2px solid var(--accent); padding-left: 4px; }
        .dimmed { opacity: 0.1; filter: blur(2px); }

        .section-add-row { margin-top: 0.45rem; display: flex; align-items: center; gap: 0.35rem; }
        .section-add-btn {
            width: 18px; height: 18px; border-radius: 4px; border: 1px dashed #334155;
            color: #64748b; background: transparent; display: inline-flex;
            align-items: center; justify-content: center; cursor: pointer; transition: 0.15s;
        }
        .section-add-btn:hover { color: #cbd5e1; border-color: #475569; background: rgba(15, 23, 42, 0.7); }
        .section-add-btn .material-symbols-outlined {
            font-size: 13px;
            line-height: 1;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }
        .section-add-input {
            flex: 1; min-width: 0; background: rgba(15, 23, 42, 0.9); border: 1px solid #334155;
            border-radius: 4px; color: #cbd5e1; font-size: 10px; padding: 3px 6px; outline: none;
        }
        .section-add-input:focus { border-color: #475569; }
        .section-add-input.invalid { border-color: #be123c; color: #fecdd3; }

        /* Sleek Todo Styling */
        .todo-item {
            display: flex; align-items: center; gap: 10px; padding: 6px 8px;
            background: rgba(15, 23, 42, 0.4); border-radius: 6px;
            margin-bottom: 4px; border: 1px solid transparent; transition: 0.2s;
        }
        .todo-section-divider {
            display: flex;
            align-items: center;
            margin: 8px 2px 6px;
            gap: 6px;
        }
        .todo-section-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(51, 65, 85, 0.85), rgba(51, 65, 85, 0.15));
        }
        .todo-section-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #64748b;
            text-transform: uppercase;
            user-select: none;
        }
        .todo-item:hover { border-color: #334155; background: rgba(15, 23, 42, 0.8); }
        .todo-item.is-today {
            background: color-mix(in srgb, var(--accent) 14%, rgba(15, 23, 42, 0.55));
            border-color: color-mix(in srgb, var(--accent) 38%, #334155);
            box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 28%, transparent);
        }
        .todo-item.is-today .task-text { color: #c7f7ff; }
        .todo-item.tagged {
            border-left: 2px solid var(--tag-color);
            box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--tag-color) 35%, transparent);
        }
        .todo-item input[type="checkbox"] {
            appearance: none; width: 14px; height: 14px; border: 1px solid #475569;
            border-radius: 3px; cursor: pointer; position: relative; background: #0f172a;
        }
        .todo-item input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
        .todo-item input[type="checkbox"]:checked::after {
            content: '✓'; position: absolute; color: #000; font-size: 10px; font-weight: bold; left: 2px; top: -1px;
        }
        .todo-item .task-text { font-size: 11px; color: #94a3b8; user-select: none; }
        .todo-inner { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
        .todo-due-label { font-size: 9px; color: #475569; }
        .todo-due-label.due-today { color: #2bc3de; }
        .todo-due-label.overdue  { color: #f87171; }
        .todo-action.has-due .material-symbols-outlined { color: #2bc3de; }
        .todo-actions { display: flex; align-items: center; gap: 4px; }
        .todo-action {
            border: 1px solid transparent; background: transparent; color: #64748b;
            width: 18px; height: 18px; border-radius: 4px; cursor: pointer; transition: 0.15s;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .todo-action:hover { color: #cbd5e1; border-color: #334155; background: rgba(15, 23, 42, 0.8); }
        .todo-action .material-symbols-outlined {
            font-size: 13px;
            line-height: 1;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }
        .todo-edit-input {
            flex: 1;
            min-width: 0;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #334155;
            border-radius: 4px;
            color: #cbd5e1;
            font-size: 11px;
            padding: 3px 6px;
            outline: none;
        }
        .todo-edit-input:focus { border-color: #475569; }
        .tag-pill {
            font-size: 9px; padding: 1px 5px; border-radius: 10px;
            border: 1px solid color-mix(in srgb, var(--tag-color) 65%, #0f172a);
            color: var(--tag-color); background: color-mix(in srgb, var(--tag-color) 10%, transparent);
        }
        .todo-item.done span { text-decoration: line-through; opacity: 0.4; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; font-size: 0.6rem; text-align: center; }
        .curr-day { background: var(--accent); color: #0b0f1a; border-radius: 2px; font-weight: bold; }
        .due-day { background: #1e3a4a; color: #2bc3de; border-radius: 2px; font-weight: bold; cursor: default; }

        .cal-tooltip {
            position: fixed; z-index: 9999;
            background: #0f172a; border: 1px solid #334155; border-radius: 6px;
            padding: 6px 8px; max-width: 180px; font-size: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .cal-tooltip-task { color: #cbd5e1; padding: 1px 0; }
        .cal-tooltip-task.done { text-decoration: line-through; opacity: 0.45; }

        .date-picker {
            position: fixed; z-index: 9999;
            background: #0f172a; border: 1px solid #334155; border-radius: 8px;
            padding: 8px; width: 164px; box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .dp-header {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 6px;
        }
        .dp-nav {
            background: transparent; border: 1px solid #334155; color: #94a3b8;
            border-radius: 3px; cursor: pointer; padding: 0 4px; font-size: 11px; line-height: 1.4;
        }
        .dp-nav:hover { color: #e2e8f0; border-color: #475569; }
        .dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
        .dp-day-label { font-size: 8px; color: #475569; text-align: center; font-weight: 700; padding-bottom: 2px; }
        .dp-cell {
            text-align: center; font-size: 9px; padding: 3px 0; color: #94a3b8;
            background: transparent; border: none; border-radius: 2px; cursor: pointer; transition: 0.1s;
        }
        .dp-cell.today {
            background: color-mix(in srgb, var(--accent) 22%, transparent);
            color: #67e8f9;
            box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 65%, transparent);
            font-weight: 700;
        }
        .dp-cell:hover { background: #1e293b; color: #e2e8f0; }

        .main-title { cursor: text; }
        .main-title-input {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #2ed8a2;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 2px 6px;
            outline: none;
            min-width: 180px;
        }
        .main-title-input:focus { border-color: #475569; }

        .auth-gate {
            position: fixed;
            inset: 0;
            z-index: 1200;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 20%, rgba(43, 195, 222, 0.16), transparent 40%), rgba(2, 6, 23, 0.92);
            padding: 1rem;
        }
        .auth-gate.hidden { display: none; }
        .auth-gate-card {
            width: min(92vw, 420px);
            border: 1px solid #1e293b;
            background: rgba(15, 23, 42, 0.92);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
        }
        .auth-gate-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #dbeafe;
            margin-bottom: 0.35rem;
            letter-spacing: 0.02em;
        }
        .auth-gate-message {
            font-size: 0.72rem;
            color: #94a3b8;
            line-height: 1.55;
            margin-bottom: 0.9rem;
        }
        .auth-gate-btn {
            width: 100%;
            border: 1px solid #155e75;
            background: rgba(8, 145, 178, 0.2);
            color: #67e8f9;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.55rem 0.75rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .auth-gate-btn:hover {
            border-color: #0e7490;
            background: rgba(14, 116, 144, 0.3);
            color: #a5f3fc;
        }
        .auth-gate-btn.hidden { display: none; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        /* ── Mobile / Responsive ── */
        @media (max-width: 767px) {
            body { overflow: auto; height: auto; min-height: 100dvh; }
            #md-render { column-count: 1; }

            /* Sidebar becomes a fixed drawer */
            #sidebar {
                position: fixed; top: 0; left: 0; bottom: 0; z-index: 400;
                width: min(80vw, 280px);
                background: #0b0f1a;
                border-right: 1px solid #1e293b;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                overflow-y: auto;
                padding: 1rem 0.75rem;
                display: flex !important;
                flex-direction: column;
                gap: 1rem;
            }
            #sidebar.drawer-open {
                transform: translateX(0);
                box-shadow: 4px 0 24px rgba(0,0,0,0.6);
            }

            /* Overlay behind drawer */
            #drawer-overlay {
                display: none;
                position: fixed; inset: 0; z-index: 399;
                background: rgba(0, 0, 0, 0.55);
                pointer-events: none;
            }
            #drawer-overlay.active {
                display: block;
                pointer-events: auto;
            }

            /* Main content takes full width */
            #main-grid {
                display: block !important;
            }
            #dashboard-section {
                padding: 0.75rem;
                min-height: calc(100dvh - 54px);
            }
            #render-container,
            #editor-container {
                min-height: calc(100dvh - 86px);
            }
            #markdown-input {
                min-height: calc(100dvh - 150px);
            }

            /* Hide clock on small screens */
            #clock { display: none; }

            /* Header search bar shrinks */
            #cmd-input-wrapper { max-width: 100% !important; }
        }

        @media (min-width: 768px) and (max-width: 1199px) {
            #md-render { column-count: 2; }
        }

        @media (min-width: 1200px) and (max-width: 1599px) {
            #md-render { column-count: 3; }
        }

        /* Hamburger btn (hidden on desktop) */
        #drawer-toggle {
            display: none;
            cursor: pointer;
            position: relative;
            z-index: 401;
        }
        @media (max-width: 767px) {
            #drawer-toggle { display: flex; }
        }
    </style>
</head>
<body class="flex flex-col">

    <div id="auth-gate" class="auth-gate">
        <div class="auth-gate-card">
            <h2 class="auth-gate-title">Private Workspace</h2>
            <p id="auth-gate-message" class="auth-gate-message">Connect with Pantry sync token (PANTRY_ID[:BASKET_NAME]).</p>
            <button id="auth-signin-btn" class="auth-gate-btn">Connect Pantry</button>
        </div>
    </div>

    <div id="drawer-overlay"></div>

    <header class="flex justify-between items-center px-4 py-2 border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-300">
        <div class="flex items-center space-x-6 flex-1">
            <button id="drawer-toggle" class="p-1.5 hover:bg-slate-800 rounded text-slate-400 items-center justify-center" aria-label="Toggle sidebar">
                <i data-lucide="menu" class="w-4 h-4"></i>
            </button>
            <div class="flex items-center">
                <span id="app-title" class="main-title text-[#2ed8a2] font-bold tracking-tighter text-sm" title="Click to edit">Home</span>
                <input id="app-title-input" type="text" class="main-title-input hidden" aria-label="Edit main title" />
            </div>
            <div id="cmd-input-wrapper" class="relative w-full max-w-md">
                <i data-lucide="terminal" class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-500"></i>
                <input type="text" id="cmd-input" placeholder="Type shortcut or search..." class="w-full bg-slate-900/50 border border-slate-800 rounded-md py-1.5 pl-10 pr-4 text-xs font-mono text-cyan-400 focus:outline-none focus:border-cyan-500/30 transition-all">
            </div>
            <div id="clock" class="font-mono text-xs text-slate-600 border-l border-slate-800 pl-4">00:00:00</div>
        </div>
        <div class="flex space-x-1 ml-4">
            <button id="toggle-editor-btn" class="p-1.5 hover:bg-slate-800 rounded text-slate-500"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
            <button id="download-md-btn" class="p-1.5 hover:bg-slate-800 rounded text-slate-500"><i data-lucide="download" class="w-4 h-4"></i></button>
        </div>
    </header>

    <main id="main-grid" class="flex-1 grid grid-cols-12 overflow-hidden">
        <aside id="sidebar" class="col-span-2 border-r border-slate-800 p-3 flex flex-col space-y-4 overflow-hidden bg-slate-950/20">
            <div id="calendars-container" class="space-y-3"></div>

            <div class="flex-1 flex flex-col min-h-0 pt-4 border-t border-slate-800">
                <h3 class="text-[9px] font-bold text-slate-600 uppercase mb-3 flex justify-between items-center px-1">
                    Terminal_Tasks
                    <span id="task-count" class="text-cyan-600 font-mono">0</span>
                </h3>

                <div id="todo-list" class="flex-1 overflow-y-auto space-y-1 pr-1"></div>

                <div class="mt-3 pt-3 border-t border-slate-900">
                    <input type="text" id="todo-input" placeholder="+ New task..." class="w-full bg-slate-900/80 border border-slate-800 rounded p-2 text-[10px] outline-none focus:border-cyan-900">
                </div>
            </div>
        </aside>

        <section id="dashboard-section" class="col-span-10 p-4 overflow-y-auto">
            <div id="render-container" class="h-full"><div id="md-render"></div></div>
            <div id="editor-container" class="hidden h-full flex flex-col space-y-2">
                <textarea id="markdown-input" class="flex-1 w-full p-6 rounded bg-slate-900/50 border border-slate-800 text-slate-400 font-mono text-xs outline-none focus:border-slate-700 transition-all"></textarea>
                <div class="flex justify-between items-center">
                    <span class="text-[10px] text-slate-600 font-mono">RAW_MARKDOWN_EDITOR</span>
                    <div class="flex items-center gap-2">
                        <button id="cancel-editor-btn" class="bg-slate-700/20 hover:bg-slate-700/40 text-slate-300 border border-slate-600/50 px-4 py-1.5 rounded text-xs font-bold transition-all">CANCEL</button>
                        <button id="commit-editor-btn" class="bg-cyan-600/20 hover:bg-cyan-600/40 text-cyan-400 border border-cyan-600/50 px-6 py-1.5 rounded text-xs font-bold transition-all">COMMIT_CHANGES</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
