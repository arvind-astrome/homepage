<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub OS // Arvind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root { --bg: #0b0f1a; --card: rgba(30, 41, 59, 0.3); --border: #1e293b; --accent: #2bc3de; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f1f5f9; height: 100vh; overflow: hidden; }

        /* Dashboard Layout */
        #md-render { column-count: 4; column-gap: 1rem; height: 100%; }
        .md-section { break-inside: avoid; margin-bottom: 0.75rem; background: var(--card); padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); display: inline-block; width: 100%; }

        #md-render h2 { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; border-left: 3px solid; padding-left: 0.5rem; margin-bottom: 0.5rem; }
        .md-section:nth-of-type(4n+1) h2 { border-color: #2ed8a2; color: #2ed8a2; }
        .md-section:nth-of-type(4n+2) h2 { border-color: #d1aff8; color: #d1aff8; }
        .md-section:nth-of-type(4n+3) h2 { border-color: #ec6183; color: #ec6183; }
        .md-section:nth-of-type(4n+4) h2 { border-color: #e8b195; color: #e8b195; }

        #md-render ul { list-style: none; padding: 0; }
        #md-render li { margin-bottom: 0.25rem; font-size: 0.75rem; color: #97989d; }
        #md-render a { color: inherit; text-decoration: none; transition: 0.1s; }
        #md-render a.match { color: #fff; background: #2bc3de33; border-left: 2px solid var(--accent); padding-left: 4px; }
        .dimmed { opacity: 0.1; filter: blur(2px); }

        .section-add-row { margin-top: 0.45rem; display: flex; align-items: center; gap: 0.35rem; }
        .section-add-btn {
            width: 18px; height: 18px; border-radius: 4px; border: 1px dashed #334155;
            color: #64748b; background: transparent; display: inline-flex;
            align-items: center; justify-content: center; cursor: pointer; transition: 0.15s;
        }
        .section-add-btn:hover { color: #cbd5e1; border-color: #475569; background: rgba(15, 23, 42, 0.7); }
        .section-add-btn .material-symbols-outlined {
            font-size: 13px;
            line-height: 1;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }
        .section-add-input {
            flex: 1; min-width: 0; background: rgba(15, 23, 42, 0.9); border: 1px solid #334155;
            border-radius: 4px; color: #cbd5e1; font-size: 10px; padding: 3px 6px; outline: none;
        }
        .section-add-input:focus { border-color: #475569; }
        .section-add-input.invalid { border-color: #be123c; color: #fecdd3; }

        /* Sleek Todo Styling */
        .todo-item {
            display: flex; align-items: center; gap: 10px; padding: 6px 8px;
            background: rgba(15, 23, 42, 0.4); border-radius: 6px;
            margin-bottom: 4px; border: 1px solid transparent; transition: 0.2s;
        }
        .todo-item:hover { border-color: #334155; background: rgba(15, 23, 42, 0.8); }
        .todo-item.tagged {
            border-left: 2px solid var(--tag-color);
            box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--tag-color) 35%, transparent);
        }
        .todo-item input[type="checkbox"] {
            appearance: none; width: 14px; height: 14px; border: 1px solid #475569;
            border-radius: 3px; cursor: pointer; position: relative; background: #0f172a;
        }
        .todo-item input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
        .todo-item input[type="checkbox"]:checked::after {
            content: '✓'; position: absolute; color: #000; font-size: 10px; font-weight: bold; left: 2px; top: -1px;
        }
        .todo-item .task-text { font-size: 11px; color: #94a3b8; user-select: none; flex: 1; }
        .todo-actions { display: flex; align-items: center; gap: 4px; }
        .todo-action {
            border: 1px solid transparent; background: transparent; color: #64748b;
            width: 18px; height: 18px; border-radius: 4px; cursor: pointer; transition: 0.15s;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .todo-action:hover { color: #cbd5e1; border-color: #334155; background: rgba(15, 23, 42, 0.8); }
        .todo-action .material-symbols-outlined {
            font-size: 13px;
            line-height: 1;
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }
        .todo-edit-input {
            flex: 1;
            min-width: 0;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #334155;
            border-radius: 4px;
            color: #cbd5e1;
            font-size: 11px;
            padding: 3px 6px;
            outline: none;
        }
        .todo-edit-input:focus { border-color: #475569; }
        .tag-pill {
            font-size: 9px; padding: 1px 5px; border-radius: 10px;
            border: 1px solid color-mix(in srgb, var(--tag-color) 65%, #0f172a);
            color: var(--tag-color); background: color-mix(in srgb, var(--tag-color) 10%, transparent);
        }
        .todo-item.done span { text-decoration: line-through; opacity: 0.4; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; font-size: 0.6rem; text-align: center; }
        .curr-day { background: var(--accent); color: #0b0f1a; border-radius: 2px; font-weight: bold; }

        .main-title { cursor: text; }
        .main-title-input {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #2ed8a2;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 2px 6px;
            outline: none;
            min-width: 180px;
        }
        .main-title-input:focus { border-color: #475569; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <header class="flex justify-between items-center px-4 py-2 border-b border-slate-800 bg-slate-950/80 backdrop-blur-md">
        <div class="flex items-center space-x-6 flex-1">
            <div class="flex items-center">
                <span id="app-title" class="main-title text-[#2ed8a2] font-bold tracking-tighter text-sm" title="Click to edit">Home</span>
                <input id="app-title-input" type="text" class="main-title-input hidden" aria-label="Edit main title" />
            </div>
            <div class="relative w-full max-w-md">
                <i data-lucide="terminal" class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-500"></i>
                <input type="text" id="cmd-input" placeholder="Type shortcut or search..." class="w-full bg-slate-900/50 border border-slate-800 rounded-md py-1.5 pl-10 pr-4 text-xs font-mono text-cyan-400 focus:outline-none focus:border-cyan-500/30 transition-all">
            </div>
            <div id="clock" class="font-mono text-xs text-slate-600 border-l border-slate-800 pl-4">00:00:00</div>
        </div>
        <div class="flex space-x-1 ml-4">
            <button onclick="toggleEditor()" class="p-1.5 hover:bg-slate-800 rounded text-slate-500"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
            <button onclick="downloadMarkdown()" class="p-1.5 hover:bg-slate-800 rounded text-slate-500"><i data-lucide="download" class="w-4 h-4"></i></button>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 overflow-hidden">
        <aside class="col-span-2 border-r border-slate-800 p-3 flex flex-col space-y-4 overflow-hidden bg-slate-950/20">
            <div id="calendars-container" class="space-y-3"></div>

            <div class="flex-1 flex flex-col min-h-0 pt-4 border-t border-slate-800">
                <h3 class="text-[9px] font-bold text-slate-600 uppercase mb-3 flex justify-between items-center px-1">
                    Terminal_Tasks
                    <span id="task-count" class="text-cyan-600 font-mono">0</span>
                </h3>

                <div id="todo-list" class="flex-1 overflow-y-auto space-y-1 pr-1"></div>

                <div class="mt-3 pt-3 border-t border-slate-900">
                    <input type="text" id="todo-input" placeholder="+ New task..." class="w-full bg-slate-900/80 border border-slate-800 rounded p-2 text-[10px] outline-none focus:border-cyan-900">
                </div>
            </div>
        </aside>

        <section class="col-span-10 p-4 overflow-y-auto">
            <div id="render-container" class="h-full"><div id="md-render"></div></div>
            <div id="editor-container" class="hidden h-full flex flex-col space-y-2">
                <textarea id="markdown-input" class="flex-1 w-full p-6 rounded bg-slate-900/50 border border-slate-800 text-slate-400 font-mono text-xs outline-none focus:border-slate-700 transition-all"></textarea>
                <div class="flex justify-between items-center">
                    <span class="text-[10px] text-slate-600 font-mono">RAW_MARKDOWN_EDITOR</span>
                    <div class="flex items-center gap-2">
                        <button onclick="cancelEditor()" class="bg-slate-700/20 hover:bg-slate-700/40 text-slate-300 border border-slate-600/50 px-4 py-1.5 rounded text-xs font-bold transition-all">CANCEL</button>
                        <button onclick="saveContent()" class="bg-cyan-600/20 hover:bg-cyan-600/40 text-cyan-400 border border-cyan-600/50 px-6 py-1.5 rounded text-xs font-bold transition-all">COMMIT_CHANGES</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const renderer = new marked.Renderer();
        const TITLE_STORAGE_KEY = 'homepageTitle';
        const DEFAULT_APP_TITLE = 'HUB_OS // ARVIND';
        let sectionIndex = 0;
        let editingLineIndex = null;
        let lastSavedMarkdown = '';

        renderer.heading = function(text, level) {
            if (level === 2) {
                let html = (sectionIndex++ > 0) ? '</div>' : '';
                return html + `<div class="md-section"><h2>${text}</h2>`;
            }
            return `<h${level}>${text}</h${level}>`;
        };

        renderer.link = function(href, title, text) {
            const safeHref = href || '#';
            const safeTitle = title ? ` title="${title}"` : '';
            return `<a href="${safeHref}" target="_blank" rel="noopener noreferrer"${safeTitle}>${text}</a>`;
        };

        // --- IMPROVED TODO LOGIC ---
        function getTagColor(tag) {
            let hash = 0;
            for (let i = 0; i < tag.length; i++) hash = ((hash << 5) - hash) + tag.charCodeAt(i);
            const hue = Math.abs(hash) % 360;
            return `hsl(${hue} 78% 62%)`;
        }

        function parseTodos() {
            const md = document.getElementById('markdown-input').value;
            const taskSection = md.split('## TASKS')[1] || "";
            const todoList = document.getElementById('todo-list');
            todoList.innerHTML = '';

            const lines = taskSection.split('\n');
            let count = 0;
            lines.forEach((line, lineIndex) => {
                const trimmed = line.trim();
                if (trimmed.startsWith('- [ ]') || trimmed.startsWith('- [x]')) {
                    count++;
                    const isDone = trimmed.startsWith('- [x]');
                    const taskText = trimmed.replace(/- \[[ x]\]/, '').trim();
                    const isEditing = editingLineIndex === lineIndex;
                    const matchedTag = taskText.match(/#[a-zA-Z0-9_-]+/);
                    const tag = matchedTag ? matchedTag[0] : '';
                    const tagColor = tag ? getTagColor(tag.toLowerCase()) : '';

                    const div = document.createElement('div');
                    div.className = `todo-item ${isDone ? 'done' : ''}`;
                    if (tagColor) {
                        div.classList.add('tagged');
                        div.style.setProperty('--tag-color', tagColor);
                    }

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = isDone;
                    checkbox.disabled = isEditing;
                    checkbox.addEventListener('change', () => toggleTodo(lineIndex, checkbox.checked));

                    let textNode;
                    if (isEditing) {
                        const editInput = document.createElement('input');
                        editInput.type = 'text';
                        editInput.className = 'todo-edit-input';
                        editInput.value = taskText;
                        editInput.setAttribute('data-edit-line', String(lineIndex));
                        editInput.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') commitInlineEdit(lineIndex);
                            if (e.key === 'Escape') cancelInlineEdit();
                        });
                        textNode = editInput;
                    } else {
                        const textSpan = document.createElement('span');
                        textSpan.className = 'task-text';
                        textSpan.textContent = taskText;
                        textSpan.title = 'Click to edit';
                        textSpan.style.cursor = 'text';
                        textSpan.addEventListener('click', () => startInlineEdit(lineIndex));
                        textNode = textSpan;
                    }

                    const actions = document.createElement('div');
                    actions.className = 'todo-actions';

                    if (tag) {
                        const tagPill = document.createElement('span');
                        tagPill.className = 'tag-pill';
                        tagPill.textContent = tag;
                        actions.appendChild(tagPill);
                    }

                    if (isEditing) {
                        const saveBtn = document.createElement('button');
                        saveBtn.type = 'button';
                        saveBtn.className = 'todo-action';
                        saveBtn.title = 'Save task';
                        saveBtn.setAttribute('aria-label', 'Save task');
                        saveBtn.innerHTML = '<span class="material-symbols-outlined" aria-hidden="true">check</span>';
                        saveBtn.addEventListener('click', () => commitInlineEdit(lineIndex));

                        const cancelBtn = document.createElement('button');
                        cancelBtn.type = 'button';
                        cancelBtn.className = 'todo-action';
                        cancelBtn.title = 'Cancel edit';
                        cancelBtn.setAttribute('aria-label', 'Cancel edit');
                        cancelBtn.innerHTML = '<span class="material-symbols-outlined" aria-hidden="true">close</span>';
                        cancelBtn.addEventListener('click', () => cancelInlineEdit());

                        actions.appendChild(saveBtn);
                        actions.appendChild(cancelBtn);
                    } else {
                        const deleteBtn = document.createElement('button');
                        deleteBtn.type = 'button';
                        deleteBtn.className = 'todo-action';
                        deleteBtn.title = 'Delete task';
                        deleteBtn.setAttribute('aria-label', 'Delete task');
                        deleteBtn.innerHTML = '<span class="material-symbols-outlined" aria-hidden="true">delete</span>';
                        deleteBtn.addEventListener('click', () => deleteTodo(lineIndex));

                        actions.appendChild(deleteBtn);
                    }

                    div.appendChild(checkbox);
                    div.appendChild(textNode);
                    div.appendChild(actions);
                    todoList.appendChild(div);

                    if (isEditing) {
                        setTimeout(() => {
                            const input = document.querySelector(`.todo-edit-input[data-edit-line="${lineIndex}"]`);
                            if (input) {
                                input.focus();
                                input.select();
                            }
                        }, 0);
                    }
                }
            });
            document.getElementById('task-count').textContent = count;
        }

        function toggleTodo(lineIndex, isChecked) {
            let md = document.getElementById('markdown-input').value;
            const parts = md.split('## TASKS');
            if (parts.length < 2) return;

            let lines = parts[1].split('\n');
            if (!lines[lineIndex]) return;
            lines[lineIndex] = lines[lineIndex].replace(/\[( |x)\]/, isChecked ? '[x]' : '[ ]');

            const updatedMd = parts[0] + '## TASKS' + lines.join('\n');
            saveSilent(updatedMd);
        }

        function startInlineEdit(lineIndex) {
            editingLineIndex = lineIndex;
            parseTodos();
        }

        function commitInlineEdit(lineIndex) {
            let md = document.getElementById('markdown-input').value;
            const parts = md.split('## TASKS');
            if (parts.length < 2) return;

            let lines = parts[1].split('\n');
            if (!lines[lineIndex]) return;

            const editInput = document.querySelector(`.todo-edit-input[data-edit-line="${lineIndex}"]`);
            if (!editInput) return;
            const updatedTaskText = editInput.value.trim();
            if (updatedTaskText === '') return;

            const prefixMatch = lines[lineIndex].match(/^(\s*-\s*\[[ x]\]\s*)/);
            const prefix = prefixMatch ? prefixMatch[1] : '- [ ] ';
            lines[lineIndex] = `${prefix}${updatedTaskText}`;

            editingLineIndex = null;

            const updatedMd = parts[0] + '## TASKS' + lines.join('\n');
            saveSilent(updatedMd);
        }

        function cancelInlineEdit() {
            editingLineIndex = null;
            parseTodos();
        }

        function editTodo(lineIndex) {
            startInlineEdit(lineIndex);
        }

        function deleteTodo(lineIndex) {
            let md = document.getElementById('markdown-input').value;
            const parts = md.split('## TASKS');
            if (parts.length < 2) return;

            let lines = parts[1].split('\n');
            if (!lines[lineIndex]) return;
            lines.splice(lineIndex, 1);

            if (editingLineIndex === lineIndex) editingLineIndex = null;
            if (editingLineIndex !== null && editingLineIndex > lineIndex) editingLineIndex -= 1;

            const updatedMd = parts[0] + '## TASKS' + lines.join('\n');
            saveSilent(updatedMd);
        }

        document.getElementById('todo-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== "") {
                let md = document.getElementById('markdown-input').value;
                if (!md.includes('## TASKS')) md += '\n\n## TASKS';

                const updatedMd = md.trim() + `\n- [ ] ${e.target.value.trim()}`;
                e.target.value = '';
                saveSilent(updatedMd);
            }
        });

        function saveSilent(newMd) {
            lastSavedMarkdown = newMd;
            document.getElementById('markdown-input').value = newMd;
            localStorage.setItem('homepageData', newMd);
            renderMarkdown(newMd);
            parseTodos();
        }

        function normalizeAddedSectionItem(rawInput) {
            const value = rawInput.trim();
            if (!value) return { item: '', error: 'empty' };

            const parts = value.split('|');
            if (parts.length < 2) return { item: '', error: 'format' };

            const key = parts[0].trim();
            const url = parts.slice(1).join('|').trim();
            if (!key || !url) return { item: '', error: 'format' };

            try {
                const parsedUrl = new URL(url);
                if (!['http:', 'https:'].includes(parsedUrl.protocol)) return { item: '', error: 'url' };
            } catch (e) {
                return { item: '', error: 'url' };
            }

            return { item: `- [${key}](${url})`, error: '' };
        }

        function addItemToSection(sectionIdx, rawInput) {
            const normalized = normalizeAddedSectionItem(rawInput);
            const newItem = normalized.item;
            if (!newItem) return { ok: false, error: normalized.error };

            const md = document.getElementById('markdown-input').value;
            const parts = md.split('## TASKS');
            const dashboard = parts[0];
            const dashboardLines = dashboard.replace(/\r/g, '').split('\n');
            const sectionHeadingLines = [];

            dashboardLines.forEach((line, i) => {
                if (/^##\s+/.test(line.trim())) sectionHeadingLines.push(i);
            });

            if (sectionIdx < 0 || sectionIdx >= sectionHeadingLines.length) return;

            const sectionStart = sectionHeadingLines[sectionIdx] + 1;
            const sectionEnd = (sectionIdx + 1 < sectionHeadingLines.length) ? sectionHeadingLines[sectionIdx + 1] : dashboardLines.length;

            let insertAt = sectionEnd;
            while (insertAt > sectionStart && dashboardLines[insertAt - 1].trim() === '') insertAt -= 1;
            dashboardLines.splice(insertAt, 0, newItem);

            const updatedDashboard = dashboardLines.join('\n');
            const updatedMd = updatedDashboard + (parts.length > 1 ? `## TASKS${parts.slice(1).join('## TASKS')}` : '');
            saveSilent(updatedMd);
            return { ok: true, error: '' };
        }

        function attachSectionAddControls() {
            const sections = document.querySelectorAll('#md-render .md-section');
            sections.forEach((section, sectionIdx) => {
                const row = document.createElement('div');
                row.className = 'section-add-row';

                const addBtn = document.createElement('button');
                addBtn.type = 'button';
                addBtn.className = 'section-add-btn';
                addBtn.title = 'Add item';
                addBtn.setAttribute('aria-label', 'Add item');
                addBtn.innerHTML = '<span class="material-symbols-outlined" aria-hidden="true">add</span>';

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'section-add-input hidden';
                input.placeholder = 'key | https://example.com';

                addBtn.addEventListener('click', () => {
                    input.classList.remove('hidden');
                    input.classList.remove('invalid');
                    input.focus();
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const result = addItemToSection(sectionIdx, input.value);
                        if (!result.ok) {
                            input.classList.add('invalid');
                            input.title = 'Use format: key | https://example.com';
                            input.focus();
                        }
                    }
                    if (e.key === 'Escape') {
                        input.value = '';
                        input.classList.remove('invalid');
                        input.classList.add('hidden');
                    }
                });

                input.addEventListener('input', () => {
                    if (input.classList.contains('invalid')) input.classList.remove('invalid');
                });

                input.addEventListener('blur', () => {
                    if (input.value.trim() === '') input.classList.add('hidden');
                });

                row.appendChild(addBtn);
                row.appendChild(input);
                section.appendChild(row);
            });
        }

        // --- CORE RENDER ---
        function renderMarkdown(text) {
            sectionIndex = 0;
            const dashboardContent = text.split('## TASKS')[0];
            document.getElementById('md-render').innerHTML = marked.parse(dashboardContent, { renderer: renderer }) + '</div>';
            attachSectionAddControls();
            lucide.createIcons();
        }

        function toggleEditor() {
            document.getElementById('render-container').classList.toggle('hidden');
            document.getElementById('editor-container').classList.toggle('hidden');
        }

        function saveContent() {
            saveSilent(document.getElementById('markdown-input').value);
            toggleEditor();
        }

        function cancelEditor() {
            document.getElementById('markdown-input').value = lastSavedMarkdown;
            toggleEditor();
        }

        function downloadMarkdown() {
            const blob = new Blob([document.getElementById('markdown-input').value], { type: 'text/markdown' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'hub.md'; a.click();
        }

        function setupEditableTitle() {
            const titleEl = document.getElementById('app-title');
            const inputEl = document.getElementById('app-title-input');

            const savedTitle = localStorage.getItem(TITLE_STORAGE_KEY) || DEFAULT_APP_TITLE;
            titleEl.textContent = savedTitle;

            function commitTitle() {
                const nextTitle = inputEl.value.trim() || DEFAULT_APP_TITLE;
                titleEl.textContent = nextTitle;
                localStorage.setItem(TITLE_STORAGE_KEY, nextTitle);
                inputEl.classList.add('hidden');
                titleEl.classList.remove('hidden');
            }

            function cancelTitle() {
                inputEl.classList.add('hidden');
                titleEl.classList.remove('hidden');
            }

            titleEl.addEventListener('click', () => {
                inputEl.value = titleEl.textContent;
                titleEl.classList.add('hidden');
                inputEl.classList.remove('hidden');
                inputEl.focus();
                inputEl.select();
            });

            inputEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') commitTitle();
                if (e.key === 'Escape') cancelTitle();
            });

            inputEl.addEventListener('blur', () => {
                commitTitle();
            });
        }

        function renderCalendars() {
            const container = document.getElementById('calendars-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const d = new Date(); d.setMonth(d.getMonth() + i);
                const wrap = document.createElement('div');
                wrap.className = 'p-2 bg-slate-900/40 rounded border border-slate-800';
                wrap.innerHTML = `<div class="text-[9px] font-bold text-slate-500 mb-1 uppercase tracking-tighter">${d.toLocaleString('default', { month: 'short' })} ${d.getFullYear()}</div>`;
                const grid = document.createElement('div');
                grid.className = 'calendar-grid';
                ['S','M','T','W','T','F','S'].forEach(day => grid.innerHTML += `<div class="text-slate-800 font-bold">${day}</div>`);
                const first = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
                const days = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
                for (let j = 0; j < first; j++) grid.innerHTML += '<div></div>';
                for (let day = 1; day <= days; day++) grid.innerHTML += `<div class="${(i===0 && day===new Date().getDate()) ? 'curr-day' : 'text-slate-600'}">${day}</div>`;
                wrap.appendChild(grid); container.appendChild(wrap);
            }
        }

        // --- COMMAND LINE SEARCH ---
        const cmdInput = document.getElementById('cmd-input');
        cmdInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const links = document.querySelectorAll('#md-render a');
            const sections = document.querySelectorAll('.md-section');
            if (query === "") {
                links.forEach(l => l.classList.remove('match'));
                sections.forEach(s => s.classList.remove('dimmed'));
                return;
            }
            links.forEach(l => l.textContent.toLowerCase().includes(query) ? l.classList.add('match') : l.classList.remove('match'));
            sections.forEach(s => s.querySelector('.match') ? s.classList.remove('dimmed') : s.classList.add('dimmed'));
        });

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const match = document.querySelector('#md-render a.match');
                if (match) { window.open(match.href, '_blank'); cmdInput.value = ""; saveSilent(document.getElementById('markdown-input').value); }
            }
        });

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            const savedData = localStorage.getItem('homepageData') || "# Welcome\n## Links\n- [Sample](https://google.com)\n\n## TASKS\n- [ ] This is a task";
            setupEditableTitle();
            lastSavedMarkdown = savedData;
            document.getElementById('markdown-input').value = savedData;
            renderMarkdown(savedData);
            parseTodos();
            setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB'); }, 1000);
            renderCalendars();
        });
    </script>
</body>
</html>
